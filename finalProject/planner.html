    <link

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300..800&family=Roboto:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles/normalize.css" />
    <link rel="stylesheet" href="styles/planner.css" />
    <link rel="stylesheet" href="styles/planner-large.css" />

    <script src="scripts/planner.js" defer></script>
    <script src="scripts/navigation.js" defer></script>

    <title>Planner | Aced</title>
  </head>
  <body>
    <header>
      <nav>
        <div class="nav">
          <div class="logo">
            <img src="images/logo-white.png" alt="Aced logo">
            <span>Aced</span>
          </div>

          <div class="navMenu">
            <i class="fa-solid fa-xmark close"></i>
            <ul>
              <li><a href="index.html">Home</a></li>
              <li><a href="study-tips.html">Study Tips</a></li>
              <li class="active"><a href="planner.html">Planner</a></li>
              <li><a href="contact.html">Contact</a></li>
            </ul>
          </div>
          <i class="fa-solid fa-bars open"></i>
        </div>
      </nav>
    </header>
    <main>
      <div class="container">
        <section class="plannerHero">
          <h1>Study Planner</h1>
          <p>Stay organized and keep track of your assignments.</p>
        </section>

        <section class="plannerControls">
          <input type="text" id="taskInput" placeholder="Enter a task" />

          <select id="priority">
            <option value="High">High Priority</option>
            <option value="Medium">Medium Priority</option>
            <option value="Low">Low Priority</option>
          </select>

          <button id="addTaskBtn"><i class="fa-solid fa-plus"></i></button>
        </section>
        <section id="taskContainer"></section>

      </div>
    </main>
    <footer></footer>
  </body>
