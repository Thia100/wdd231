<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Fathia Diekola Gbolahan" />
    <meta name="description" content="" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300..800&family=Roboto:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles/normalize.css" />
    <link rel="stylesheet" href="styles/planner.css" />
    <link rel="stylesheet" href="styles/planner-large.css" />

    <script src="scripts/planner.js" defer></script>

    <title>Planner | Aced</title>
  </head>
  <body>
    <header></header>
    <main>
      <div class="container">
        <section class="plannerHero">
          <h1>Study Planner</h1>
          <p>Stay organized and keep track of your assignments.</p>
        </section>

        <section class="plannerControls">
          <input type="text" id="taskInput" placeholder="Enter a task" />

          <select id="priority">
            <option value="High">High Priority</option>
            <option value="Medium">Medium Priority</option>
            <option value="Low">Low Priority</option>
          </select>

          <button id="addTaskBtn"><i class="fa-solid fa-plus"></i></button>
        </section>
        <section id="taskContainer"></section>

      </div>
    </main>
    <footer></footer>
  </body>
</html>
