  <body>
    <header>
      <nav>
        <div class="nav">
          <div class="logo">
            <img src="images/logo-white.png" alt="Aced logo" />
            <span>Aced</span>
          </div>

          <div class="navMenu">
            <i class="fa-solid fa-xmark close" aria-label="Close navigation"></i>
            <ul>
              <li><a href="index.html">Home</a></li>
              <li><a href="study-tips.html">Study Tips</a></li>
              <li class="active"><a href="planner.html">Planner</a></li>
              <li><a href="contact.html">Contact</a></li>
            </ul>
          </div>
          <i class="fa-solid fa-bars open"></i>
        </div>
      </nav>
    </header>
    <main>
      <div class="container">
        <section class="plannerHero">
          <h1>Study Planner</h1>
          <p>Stay organized and keep track of your assignments.</p>
        </section>

        <section class="plannerControls">
          <label for="taskInput" class="sr-only">Task</label>
          <input type="text" id="taskInput" placeholder="Enter a task" name="taskInput"/>

          <label for="priority" class="sr-only">Select Priority</label>
          <select id="priority" name="priority">
            <option value="High">High Priority</option>
            <option value="Medium">Medium Priority</option>
            <option value="Low">Low Priority</option>
          </select>
          

          <button id="addTaskBtn" aria-label="Add task"><i class="fa-solid fa-plus"></i></button>
        </section>
        <section id="taskContainer"></section>
      </div>
    </main>
    <footer>
      <div class="footer container">
        <div class="footerLogo">
          <img src="images/logo-white.png" alt="Aced logo" />
          <p>Aced — Study smarter, not harder.</p>
        </div>

        <ul class="footerLinks">
          <li><a href="index.html">Home</a></li>

          </li>

          <li>

      </div>
