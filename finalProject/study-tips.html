<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Fathia Diekola Gbolahan" />
    <meta name="description" content="" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300..800&family=Roboto:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles/normalize.css" />
    <link rel="stylesheet" href="styles/study-tips.css" />
    <link rel="stylesheet" href="styles/study-tips-large.css" />

    <script src="scripts/displayTips.js" defer></script>
    <script src="scripts/navigation.js" defer></script>

    <title>Study Tips | Aced</title>
  </head>
  <body>
    <header>
      <nav>
        <div class="nav">
          <div class="logo">
            <img src="images/logo-white.png" alt="Aced logo">
            <span>Aced</span>
          </div>

          <div class="navMenu">
            <i class="fa-solid fa-xmark close"></i>
            <ul>
              <li><a href="index.html">Home</a></li>
              <li class="active"><a href="study-tips.html">Study Tips</a></li>
              <li><a href="planner.html">Planner</a></li>
              <li><a href="contact.html">Contact</a></li>
            </ul>
          </div>
          <i class="fa-solid fa-bars open"></i>
        </div>
      </nav>
    </header>
    <main>
      <div class="container">
        <section class="tipsHero">
          <h1>Study Tips Library</h1>
          <p>
            Search, filter, and discover practical techniques to improve focus,
            memory, and productivity.
          </p>
        </section>
        <div class="filterSection">
          <input
            type="text"
            id="searchInput"
            placeholder="Search study tips..."
          />
          <select id="categoryFilter">
            <option value="all">All</option>
            <option value="Time Management">Time Management</option>
            <option value="Memory">Memory</option>
            <option value="Productivity">Productivity</option>
          </select>
        </div>

        <div id="displayTipsContainer"></div>

        <dialog id="tipModal">
          <div class="tipModalHeader">
            <h2 id="modalTitle"></h2>
            <button id="closeModal"><i class="fa-solid fa-xmark"></i></button>
          </div>
          <p id="modalDescription"></p>
        </dialog>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
