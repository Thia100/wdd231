<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Fathia Diekola Gbolahan" />
    <meta name="description" content="Thank you for contacting Aced. Your message has been received successfully." />
    <title>Thank you | Aced</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <link rel="stylesheet" href="styles/thankyou.css" />
    <link rel="icon" href="favicon.ico" />
    <script src="scripts/display-form-info.js" defer></script>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="thankYouCard">
          <div class="successIcon">
            <i class="fa-solid fa-circle-check"></i>
          </div>

          <h1>Thank You!</h1>

          <p class="intro">
            Your message has been received. We'll get back to you as soon as
            possible.
          </p>

          <div class="submittedInfo">
            <p><strong>Name:</strong> <span id="name"></span></p>
            <p><strong>Email:</strong> <span id="email"></span></p>
            <p><strong>Mobile Number:</strong> <span id="phone"></span></p>
            <p><strong>Subject:</strong> <span id="subject"></span></p>
            <p><strong>Message:</strong> <span id="message"></span></p>
          </div>

          <a href="index.html" class="homeBtn">Return Home</a>
        </div>
      </div>
    </main>
  </body>
</html>
