<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Fathia Diekola Gbolahan">
    <meta name="description" content="Display current weather information using OpenWeatherMap API.">
    <title>Open Weather API</title>
    <script src="scripts/weatherapi.js" defer></script> <!-- Moved script tag to head for better practice -->
</head>
<body>
    <header>
        <h1>OpenWeatherMap.org API Test</h1>
    </header>
    <main>
        <p>The current temperature in Trier, Germany is <span id="current-temp"></span>°F</p> <!-- Added °F for clarity -->
        <figure>
          <img id="weather-icon" src="" alt="Weather Icon">
          <figcaption id="captionDesc"></figcaption> <!-- Added id for caption to be updated -->
        </figure>
    </main>
    <footer>
        <p>Fathia Diekola Gbolahan | OpenWeatherMap.org | CC BY-SA 4.0</p>
    </footer>
</body>
</html>
